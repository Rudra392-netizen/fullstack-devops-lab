apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment

spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend
          image: aiml074/backend:latest
          ports:
            - containerPort: 80
          
          resources:
           requests:
              cpu: "100m"
              memory: "128Mi"
           limits:
              cpu: "500m"
              memory: "512Mi"

      imagePullSecrets:
        - name: dockerhub-secret