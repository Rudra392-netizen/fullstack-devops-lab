apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment

spec:
  replicas: 2

  revisionHistoryLimit: 10
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
        - name: frontend
          image: aiml074/frontend:v1
          ports:
            - containerPort: 80
          
          resources:
           requests:
              cpu: "100m"
              memory: "128Mi"
           limits:
              cpu: "500m"
              memory: "512Mi"

         
          
      imagePullSecrets:
        - name: dockerhub-secret